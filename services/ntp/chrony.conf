# ============================================================
#  chrony.conf — Servidor NTP Ministerio del Trabajo
# ============================================================

# Fuentes NTP públicas confiables
server 0.pool.ntp.org iburst
server 1.pool.ntp.org iburst
server 2.pool.ntp.org iburst
server 3.pool.ntp.org iburst

# Directorio de deriva
driftfile /var/lib/chrony/drift

# Permitir sincronización a clientes de ambas VLANs
allow 192.168.10.0/24
allow 192.168.20.0/24

# Actuar como servidor NTP local si se pierde conectividad
local stratum 10

# Logs
logdir /var/log/chrony
log measurements statistics tracking
